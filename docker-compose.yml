version: '3.8'

services:
  # 1. Base de Datos: Azure SQL Edge
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: zf_halo_db
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ZfHaloAdmin2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # 2. Backend API (NestJS)
  backend:
    image: node:20
    container_name: zf_halo_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3000"
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    depends_on:
      - db

  # 3. Frontend SPA (Next.js)
  frontend:
    image: node:20
    container_name: zf_halo_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4000:4000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  sql_data:
    name: zf_halo_sql_data