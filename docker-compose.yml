version: '3.8'

services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: zf_halo_db
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ZfHaloAdmin2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    image: node:20
    container_name: zf_halo_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3000"
    command: sh -c "npm install && npx prisma generate && npm run build && npm run start:prod"
    depends_on:
      - db

  frontend:
    image: node:20
    container_name: zf_halo_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4000:4000"
    environment:
      - NEXT_PUBLIC_API_URL=http://108.175.13.227:3001
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      - backend

volumes:
  sql_data:
    name: zf_halo_sql_data